version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "1883:1883"
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: omni
      DOCKER_INFLUXDB_INIT_PASSWORD: omni_password
      DOCKER_INFLUXDB_INIT_ORG: omnivigil
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: omni_token

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omni_password
      POSTGRES_DB: maintenance

  ms1-ingestor:
    build:
      context: ./services/ms1-ingestor
    ports:
      - "8001:8001"
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: omni_token
      INFLUXDB_ORG: omnivigil
      INFLUXDB_BUCKET: telemetry
      AI_ENGINE_URL: http://ms2-ai-engine:8002
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: omnivigil/telemetry
    depends_on:
      - influxdb
      - mosquitto

  ms2-ai-engine:
    build:
      context: ./services/ms2-ai-engine
    ports:
      - "8002:8002"
    environment:
      REDIS_URL: redis://redis:6379
      ALERT_URL: http://ms3-alert:8003
      MAINTENANCE_URL: http://ms4-maintenance:8004
    depends_on:
      - redis

  ms3-alert:
    build:
      context: ./services/ms3-alert
    ports:
      - "8003:8003"
    environment:
      RABBITMQ_URL: amqp://rabbitmq:5672
    depends_on:
      - rabbitmq

  ms4-maintenance:
    build:
      context: ./services/ms4-maintenance
    ports:
      - "8004:8004"
    environment:
      POSTGRES_URL: postgres://omni:omni_password@postgres:5432/maintenance
    depends_on:
      - postgres

  sim-sensor:
    build:
      context: ./services/sim-sensor
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: omnivigil/telemetry
      DEVICE_ID: motor-001
      INTERVAL_MS: 1500
      ANOMALY_RATE: 0.04
    depends_on:
      - mosquitto
